<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#0f0f18"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2=".8" y2="1">
      <stop offset="0%" stop-color="#ff7e3a"/>
      <stop offset="40%" stop-color="#ff5c1a"/>
      <stop offset="100%" stop-color="#d94410"/>
    </linearGradient>
    <linearGradient id="shellLight" x1=".2" y1="0" x2=".8" y2="1">
      <stop offset="0%" stop-color="#ffa060"/>
      <stop offset="100%" stop-color="#ff6b2b"/>
    </linearGradient>
    <linearGradient id="clawL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffaa66"/>
      <stop offset="100%" stop-color="#ff6020"/>
    </linearGradient>
    <linearGradient id="clawR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffaa66"/>
      <stop offset="100%" stop-color="#ff6020"/>
    </linearGradient>
    <radialGradient id="belly" cx=".5" cy=".4" r=".6">
      <stop offset="0%" stop-color="#ffb87a"/>
      <stop offset="100%" stop-color="#ff8844"/>
    </radialGradient>
    <radialGradient id="eyeW" cx=".4" cy=".35" r=".5">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#e8e8ec"/>
    </radialGradient>
    <linearGradient id="bagShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#fff" stop-opacity=".04"/>
      <stop offset="60%" stop-color="#fff" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity=".18"/>
    </filter>
    <filter id="ssh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity=".12"/>
    </filter>
  </defs>

  <!-- BAG -->
  <g filter="url(#sh)">
    <rect x="130" y="210" width="252" height="205" rx="22" fill="url(#bag)"/>
    <rect x="130" y="210" width="252" height="205" rx="22" fill="url(#bagShine)"/>
    <rect x="130" y="210" width="252" height="18" rx="22" ry="8" fill="#252535" opacity=".6"/>
    <line x1="150" y1="310" x2="362" y2="310" stroke="#252535" stroke-width="1" opacity=".3"/>
  </g>
  <path d="M200 210 L200 170 Q200 130 256 130 Q312 130 312 170 L312 210" fill="none" stroke="url(#handle)" stroke-width="16" stroke-linecap="round"/>
  <path d="M200 210 L200 170 Q200 130 256 130 Q312 130 312 170 L312 210" fill="none" stroke="#0f0f18" stroke-width="8" stroke-linecap="round"/>

  <!-- CRAYFISH -->
  <g filter="url(#ssh)">
    <!-- Antennae -->
    <path d="M240 238 Q218 200 190 175 Q180 166 185 170" fill="none" stroke="#ff8844" stroke-width="3" stroke-linecap="round" opacity=".9"/>
    <path d="M272 238 Q294 200 322 175 Q332 166 327 170" fill="none" stroke="#ff8844" stroke-width="3" stroke-linecap="round" opacity=".9"/>
    <circle cx="185" cy="170" r="3.5" fill="#ffaa66"/>
    <circle cx="327" cy="170" r="3.5" fill="#ffaa66"/>
    <path d="M244 242 Q228 218 212 200" fill="none" stroke="#ff9955" stroke-width="2" stroke-linecap="round" opacity=".7"/>
    <path d="M268 242 Q284 218 300 200" fill="none" stroke="#ff9955" stroke-width="2" stroke-linecap="round" opacity=".7"/>

    <!-- Left arm + claw -->
    <path d="M208 268 Q170 252 148 238 Q135 228 128 220" fill="none" stroke="url(#clawL)" stroke-width="14" stroke-linecap="round"/>
    <ellipse cx="125" cy="218" rx="22" ry="14" fill="url(#clawL)" transform="rotate(-25 125 218)"/>
    <path d="M115 210 Q98 195 90 185 Q86 180 94 183 Q102 186 112 198 Z" fill="url(#clawL)"/>
    <path d="M118 224 Q100 228 90 225 Q84 222 92 218 Q100 214 114 218 Z" fill="#ff7733"/>
    <path d="M94 184 Q95 200 92 218" fill="none" stroke="#e04510" stroke-width="1.5" opacity=".5"/>
    <ellipse cx="120" cy="212" rx="8" ry="5" fill="#ffbb77" opacity=".4" transform="rotate(-25 120 212)"/>

    <!-- Right arm + claw -->
    <path d="M304 268 Q342 252 364 238 Q377 228 384 220" fill="none" stroke="url(#clawR)" stroke-width="14" stroke-linecap="round"/>
    <ellipse cx="387" cy="218" rx="22" ry="14" fill="url(#clawR)" transform="rotate(25 387 218)"/>
    <path d="M397 210 Q414 195 422 185 Q426 180 418 183 Q410 186 400 198 Z" fill="url(#clawR)"/>
    <path d="M394 224 Q412 228 422 225 Q428 222 420 218 Q412 214 398 218 Z" fill="#ff7733"/>
    <path d="M418 184 Q417 200 420 218" fill="none" stroke="#e04510" stroke-width="1.5" opacity=".5"/>
    <ellipse cx="392" cy="212" rx="8" ry="5" fill="#ffbb77" opacity=".4" transform="rotate(25 392 212)"/>

    <!-- Body -->
    <ellipse cx="256" cy="290" rx="52" ry="38" fill="url(#shell)"/>
    <path d="M220 285 Q256 270 292 285" fill="none" stroke="#e04510" stroke-width="1" opacity=".3"/>
    <path d="M225 295 Q256 282 287 295" fill="none" stroke="#e04510" stroke-width="1" opacity=".25"/>
    <ellipse cx="256" cy="295" rx="32" ry="22" fill="url(#belly)" opacity=".5"/>

    <!-- Head -->
    <ellipse cx="256" cy="255" rx="36" ry="25" fill="url(#shell)"/>
    <ellipse cx="250" cy="248" rx="16" ry="10" fill="#ffaa66" opacity=".25" transform="rotate(-10 250 248)"/>
    <path d="M248 232 L256 218 L264 232" fill="url(#shellLight)"/>

    <!-- Eyes -->
    <path d="M240 242 Q236 228 232 222" fill="none" stroke="#e04510" stroke-width="5" stroke-linecap="round"/>
    <path d="M272 242 Q276 228 280 222" fill="none" stroke="#e04510" stroke-width="5" stroke-linecap="round"/>
    <circle cx="230" cy="220" r="10" fill="url(#eyeW)" stroke="#d94410" stroke-width="1.5"/>
    <circle cx="282" cy="220" r="10" fill="url(#eyeW)" stroke="#d94410" stroke-width="1.5"/>
    <circle cx="232" cy="221" r="5" fill="#1a1a2e"/>
    <circle cx="284" cy="221" r="5" fill="#1a1a2e"/>
    <circle cx="234" cy="219" r="2" fill="#fff"/>
    <circle cx="286" cy="219" r="2" fill="#fff"/>
    <circle cx="230" cy="224" r="1" fill="#fff" opacity=".5"/>
    <circle cx="282" cy="224" r="1" fill="#fff" opacity=".5"/>

    <!-- Mouth -->
    <path d="M246 262 Q256 270 266 262" fill="none" stroke="#c03810" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="218" y1="285" x2="192" y2="298" stroke="#e04510" stroke-width="4" stroke-linecap="round"/>
    <line x1="215" y1="295" x2="188" y2="310" stroke="#e04510" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="214" y1="304" x2="190" y2="320" stroke="#e04510" stroke-width="3" stroke-linecap="round"/>
    <line x1="294" y1="285" x2="320" y2="298" stroke="#e04510" stroke-width="4" stroke-linecap="round"/>
    <line x1="297" y1="295" x2="324" y2="310" stroke="#e04510" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="298" y1="304" x2="322" y2="320" stroke="#e04510" stroke-width="3" stroke-linecap="round"/>

    <!-- Tail -->
    <ellipse cx="256" cy="322" rx="40" ry="12" fill="#d94410"/>
    <ellipse cx="256" cy="336" rx="32" ry="9" fill="#c53d0e" opacity=".85"/>
    <ellipse cx="256" cy="348" rx="24" ry="7" fill="#b83508" opacity=".7"/>
    <ellipse cx="256" cy="358" rx="16" ry="5" fill="#a42f06" opacity=".6"/>
    <path d="M240 362 Q228 380 220 390 Q216 396 224 392 Q232 386 240 374 Z" fill="#d94410" opacity=".7"/>
    <path d="M256 364 Q256 384 256 394 Q256 400 260 392 Q264 384 260 370 Z" fill="#c53d0e" opacity=".7"/>
    <path d="M272 362 Q284 380 292 390 Q296 396 288 392 Q280 386 272 374 Z" fill="#d94410" opacity=".7"/>
    <path d="M234 366 Q218 378 210 386 Q206 390 214 388 Q222 384 236 372 Z" fill="#e04510" opacity=".45"/>
    <path d="M278 366 Q294 378 302 386 Q306 390 298 388 Q290 384 276 372 Z" fill="#e04510" opacity=".45"/>
  </g>

  <!-- WORDMARK -->
  <text x="256" y="448" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="42" fill="#1a1a1a" letter-spacing="-1.5">
    Claw<tspan fill="#ff5c1a">Mart</tspan>
  </text>
  <text x="256" y="474" text-anchor="middle" font-family="'DM Sans','Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="13" fill="#999" letter-spacing="3.5">AGENT MARKETPLACE</text>
</svg>
